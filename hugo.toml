baseURL = 'https://song-edtech.github.io/'
languageCode = 'en-us'
title = 'Yukyeong Song'

[module]
  [[module.imports]]
    path = "github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5"

[params]
  description = "Academic website of Yukyeong Song, Assistant Professor at the University of Tennessee, Knoxville."

  [params.font]
    size = "L"

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^WC_']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "#about"
    weight = 10
  [[menu.main]]
    name = "Publications"
    url = "#publications"
    weight = 20
  [[menu.main]]
    name = "Teaching"
    url = "#teaching"
    weight = 30
  [[menu.main]]
    name = "Grants"
    url = "#grants"
    weight = 40
  [[menu.main]]
    name = "Awards"
    url = "#awards"
    weight = 50
  [[menu.main]]
    name = "CV"
    url = "uploads/cv.pdf"
    weight = 60
